<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BattleEarn Notification Tester</title>

  <link rel="manifest" href="manifest.json">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      margin-bottom:15px;
    }

    button{
      background:#f59e0b;
      color:black;
      border:none;
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      margin-right:10px;
      margin-top:10px;
      font-weight:bold;
    }

    button:hover{
      opacity:.9;
    }

    .status{
      margin-top:10px;
      padding:10px;
      border-radius:10px;
      background:#334155;
    }

    #notificationLog{
      max-height:300px;
      overflow:auto;
      white-space:pre-wrap;
    }

    .success{
      color:#22c55e;
    }

    .error{
      color:#ef4444;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>BattleEarn Notification Tester</h1>

  <div class="card">
    <h2>Status</h2>

    <div class="status" id="firebaseStatus">
      Firebase: Checking...
    </div>

    <div class="status" id="permissionStatus">
      Notification Permission: Unknown
    </div>

    <div class="status" id="tokenStatus">
      FCM Token: Not Generated
    </div>
  </div>

  <div class="card">
    <h2>Notification Setup</h2>

    <button id="enableBtn">
      Enable Notifications
    </button>

    <button id="copyBtn">
      Copy Token
    </button>

    <textarea
      id="tokenBox"
      rows="8"
      placeholder="FCM Token will appear here">
    </textarea>
  </div>

  <div class="card">
    <h2>Link To BattleEarn User</h2>

    <input
      type="text"
      id="uidInput"
      placeholder="Enter BattleEarn UID">

    <button id="saveBtn">
      Save Token To Firestore
    </button>

    <div class="status" id="saveStatus">
      Waiting...
    </div>
  </div>

  <div class="card">
    <h2>Notification Console</h2>

    <div id="notificationLog">
      Waiting for notifications...
    </div>
  </div>

</div>

<script type="module" src="app.js"></script>

</body>
    </html>
